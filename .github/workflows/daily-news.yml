name: news-digest

on:
  schedule:
    - cron: '0 5 * * *'    # 08:00 МСК — утренний дайджест
    - cron: '0 17 * * *'   # 20:00 МСК — вечерний дайджест
  workflow_dispatch:        # ручной запуск из вкладки Actions

permissions:
  contents: write           # нужно, чтобы коммитить seen.json обратно в репозиторий

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py

      - name: Persist seen state
        run: |
          if ! git diff --quiet -- seen.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update seen state [skip ci]"
            git push
          else
            echo "seen.json без изменений — коммит не нужен"
          fi
